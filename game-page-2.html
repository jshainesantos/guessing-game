<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Number Guessing — Info</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>

  <body class="press-start">
    <main>
      <div class="app-shell">
        <div class="card mx-auto shadow">
          <div class="card-body">
            <div class="hero mb-2">
              <div class="logo">
                <i class="bi bi-gear-fill" style="color: #ffd8e0"></i>
              </div>
              <div>
                <div class="title">Hello, Player!</div>
                <div class="subtitle">
                  Pick a difficulty to start the challenge
                </div>
              </div>
            </div>
            <p class="welcomeMsg" style="color: var(--muted)">
              Welcome to the Ultimate Number Guessing Challenge! Choose Continue
              to pick a difficulty and begin.
            </p>
            <div class="d-flex justify-content-end mt-3">
              <a
                href="game-page-3.html"
                class="btn btn-primary-custom rounded-pill px-4"
                id="continueBtn"
                >Continue</a
              >
            </div>
          </div>
        </div>
        <footer>
          Developed by <b>Byron Oscar Dones</b> and <b>Shaine Santos</b>
        </footer>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
