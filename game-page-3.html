<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Number Guessing Game</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>

  <body class="press-start">
    <main>
      <div class="app-shell">
        <div class="card mx-auto shadow">
          <div class="card-body">
            <div class="d-flex justify-content-between">
              <a
                href="game-page-2.html"
                class="btn btn-ghost btn-sm"
                aria-label="Back"
                ><i class="bi bi-arrow-left"></i
              ></a>
              <!-- <div class="status">Developed by <b>Byron O. Dones</b> & <b>Shaine S.</b></div> -->
            </div>

            <div class="text-center mt-3">
              <h3 class="fw-bold">Number Guessing Game</h3>
              <p class="pt-2">
                Guess the hidden number before your tries run out.
              </p>
            </div>

            <div class="mt-4">
              <div class="card">
                <div class="card-body text-center">
                  <div class="input-group mb-3">
                    <input
                      type="number"
                      id="inputNum"
                      class="form-control"
                      placeholder="Enter a number"
                      disabled
                      min="0"
                      max="100"
                    />
                    <button class="btn btn-ghost" disabled id="guessBtn">
                      <i class="bi bi-search"></i> Guess
                    </button>
                  </div>

                  <div
                    id="rangeDisplay"
                    class="status mt-1"
                    aria-live="polite"
                  ></div>

                  <p class="text-center fs-5 mt-2" id="guesses"></p>
                  <hr />

                  <div
                    id="cardArea"
                    class="d-flex justify-content-center gap-2"
                  >
                    <button
                      class="btn btn-primary-custom rounded-pill px-3"
                      id="easyBtn"
                    >
                      Easy
                    </button>
                    <button
                      class="btn btn-primary-custom rounded-pill px-3"
                      id="moderateBtn"
                    >
                      Moderate
                    </button>
                    <button
                      class="btn btn-primary-custom rounded-pill px-3"
                      id="hardBtn"
                    >
                      Hard
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="modals">
              <div
                class="modal fade"
                id="winnerModal"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                    <div class="modal-body text-center">
                      <i class="bi bi-trophy-fill text-warning me-2"></i
                      ><span class="fs-4">You Won!</span>
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-primary-custom"
                        id="restartBtn"
                      >
                        Play again
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="modal fade"
                id="loseModal"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                    <div class="modal-body text-center">
                      <i class="bi bi-x-circle-fill text-danger me-2"></i
                      ><span class="fs-5">Game Over</span>
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-ghost"
                        id="loseRestartBtn"
                      >
                        Restart
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="modal fade"
                id="chooseModal"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                    <div class="modal-body text-center">
                      Please select a number within the allowed range.
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-ghost"
                        data-bs-dismiss="modal"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="modal fade"
                id="letterModal"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                    <div class="modal-body text-center">
                      Please enter numeric values only.
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-ghost"
                        data-bs-dismiss="modal"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="modal fade"
                id="emptyModal"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                    <div class="modal-body text-center">
                      Field cannot be empty.
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-ghost"
                        data-bs-dismiss="modal"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      Developed by <b>Byron Oscar Dones</b> and <b>Shaine Santos</b>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
