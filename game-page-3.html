<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Number Guessing Game</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bg-black press-start text-light">
    <main class="container mt-5">
      <div class="row">
        <div class="col-md-8 mx-auto">
          <div class="card shadow bg-dark text-light">
            <div class="card-body">
              <a href="game-page-2.html" class="btn btn-outline-light btn-sm">🔙</a>
              <div class="text-center mt-4">
                <h3 class="fw-bold">Number Guessing Game 🔢</h3>
                <p class="pt-3">A simple game: guess the hidden number.</p>
              </div>

              <div class="row mt-4">
                <div class="col-12">
                  <div class="card shadow-sm">
                    <div class="card-body text-center">
                      <div class="input-group">
                        <input type="number" id="inputNum" class="form-control" placeholder="Enter a number" disabled min="0" max="100" />
                        <button class="btn btn-outline-light" disabled id="guessBtn">Guess</button>
                      </div>

                      <p class="text-center fs-5 mt-4" id="guesses"></p>
                      <hr class="mt-4" />

                      <div id="cardArea" class="d-flex justify-content-center gap-2">
                        <button class="btn btn-danger rounded-pill px-4" id="easyBtn">Easy</button>
                        <button class="btn btn-danger rounded-pill px-4" id="moderateBtn">Moderate</button>
                        <button class="btn btn-danger rounded-pill px-4" id="hardBtn">Hard</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <audio id="bg-music" hidden>
                <source src="de Blob - Blissful.mp3" type="audio/mp3" />
              </audio>

              <!-- Modals -->
              <div class="modals">
                <div class="modal fade" id="winnerModal" tabindex="-1" aria-hidden="true">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                      <div class="modal-body fs-1 text-center">You Won! 🎉</div>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-success" id="restartBtn">Play again</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="modal fade" id="loseModal" tabindex="-1" aria-hidden="true">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                      <div class="modal-body text-center">❌ Game Over!</div>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="loseRestartBtn">Restart</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="modal fade" id="chooseModal" tabindex="-1" aria-hidden="true">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                      <div class="modal-body text-center">Please select a number within the allowed range.</div>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="modal fade" id="letterModal" tabindex="-1" aria-hidden="true">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                      <div class="modal-body text-center">Please enter numeric values only.</div>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="modal fade" id="emptyModal" tabindex="-1" aria-hidden="true">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                      <div class="modal-body text-center">Field cannot be empty.</div>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center mt-4 text-light">Developed by <b>Byron Oscar Dones</b> and <b>Shaine Santos</b></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
